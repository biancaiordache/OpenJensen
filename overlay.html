<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; pointer-events: none; }
  html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

// ══════════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
const P = {
  // Face image
  faceSize:       150,    // px, matches the asset
  faceOffsetX:    0,      // offset from cursor center
  faceOffsetY:    -20,    // slightly above cursor

  // Crack visual feedback
  crackScaleMax:  1.35,   // scale on crack
  crackScaleDecay:0.88,   // how fast it returns to 1.0

  // Bob animation
  bobAmplitude:   3,      // px of gentle hover
  bobSpeed:       0.003,  // radians per ms
};

// ══════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouseX = W / 2, mouseY = H / 2;
let active = false;
let crackScale = 1.0;

const CRACK_SOUNDS = ['sounds/A.mp3', 'sounds/B.mp3', 'sounds/C.mp3', 'sounds/D.mp3', 'sounds/E.mp3'];

// Preload image
const jensenImg = new Image();
jensenImg.src = 'assets/jensen.png';

// Track mouse via main process polling (overlay is click-through, so mousemove won't fire)
setInterval(() => {
  const pt = window.bridge.getCursorPosition();
  if (pt) { mouseX = pt.x; mouseY = pt.y; }
}, 16);

function playCrackSound() {
  if (!CRACK_SOUNDS.length) return;
  const src = CRACK_SOUNDS[Math.floor(Math.random() * CRACK_SOUNDS.length)];
  const a = new Audio(src);
  a.play().catch(() => {});
}

// ── Update ──────────────────────────────────────────────────────────────────
function update() {
  if (!active) return;

  // Decay crack scale back to 1.0
  if (crackScale > 1.001) {
    crackScale = 1.0 + (crackScale - 1.0) * P.crackScaleDecay;
  } else {
    crackScale = 1.0;
  }
}

// ── Rendering ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (!active) return;

  const half = P.faceSize / 2;
  const bob = Math.sin(Date.now() * P.bobSpeed) * P.bobAmplitude;
  const cx = mouseX + P.faceOffsetX;
  const cy = mouseY + P.faceOffsetY + bob;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(crackScale, crackScale);
  ctx.drawImage(jensenImg, -half, -half, P.faceSize, P.faceSize);
  ctx.restore();
}

// ── Main loop ───────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── IPC from main process ───────────────────────────────────────────────────
window.bridge.onSpawnWhip(() => {
  active = true;
  crackScale = 1.0;
});

window.bridge.onDropWhip(() => {
  active = false;
});

window.bridge.onCrack(() => {
  crackScale = P.crackScaleMax;
  playCrackSound();
});

</script>
</body>
</html>
